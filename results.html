<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CosmicID — Astronomical Object Classifier Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #050d1a;
    --panel: #0a1628;
    --border: #0f3460;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff9d;
    --red: #ff3c5a;
    --yellow: #ffd93d;
    --purple: #8b5cf6;
    --text: #c8e0f4;
    --dim: #4a6fa5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .everything { position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  header h1 span { color: var(--accent); }
  .status-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--green);
    color: var(--green);
    animation: pulse-pill 1.5s infinite;
  }
  @keyframes pulse-pill {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,255,157,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(0,255,157,0); }
  }

  /* Main Layout */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  /* Model Selector */
  .model-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    justify-content: center;
  }
  .model-btn {
    font-family: 'Share Tech Mono', monospace;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 10px 24px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .model-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.1);
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }
  .model-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Metrics Strip */
  .metrics-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: all 0.3s;
  }
  .metric-card.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
  }
  .metric-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .metric-label {
    font-size: 10px;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Two Column Layout */
  .two-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* Panel */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    position: relative;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Confusion Matrix Table */
  .confusion-matrix {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }
  .confusion-matrix th,
  .confusion-matrix td {
    border: 1px solid var(--border);
    padding: 10px;
    text-align: center;
  }
  .confusion-matrix th {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    font-weight: 500;
  }
  .confusion-matrix td {
    color: var(--text);
  }
  .diagonal {
    background: rgba(0,255,157,0.1);
    color: var(--green);
    font-weight: bold;
  }

  /* Feature Importance Bars */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .feature-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feature-name {
    width: 100px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }
  .feature-bar-container {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    height: 24px;
    overflow: hidden;
  }
  .feature-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #fff;
  }
  .feature-value {
    width: 45px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    text-align: right;
    color: var(--accent);
  }

  /* Three Columns */
  .three-columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 20px;
  }

  /* Classification Report Table */
  .class-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .class-table th,
  .class-table td {
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .class-table th {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
  }

  /* Gauge */
  .gauge-container {
    text-align: center;
    margin: 15px 0;
  }
  .gauge-svg {
    width: 120px;
    height: 120px;
  }

  /* Responsive */
  @media (max-width: 1000px) {
    .two-columns, .three-columns { grid-template-columns: 1fr; }
    .metrics-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="everything">

<header>
  <div class="logo">COSMICID // ML CLASSIFIER</div>
  <h1>Astronomical Object Classification: <span>Stars · Galaxies · Quasars</span></h1>
  <div class="status-pill">● ACTIVE</div>
</header>

<div class="main">

  <!-- Model Selector -->
  <div class="model-selector">
    <button class="model-btn active" onclick="selectModel('prism')">PRISM</button>
    <button class="model-btn" onclick="selectModel('xgboost')">XGBoost</button>
    <button class="model-btn" onclick="selectModel('rf')">Random Forest</button>
  </div>

  <!-- Metrics Strip -->
  <div class="metrics-strip" id="metricsStrip">
    <!-- Dynamic -->
  </div>

  <!-- Two Columns: Confusion Matrix + Feature Importance -->
  <div class="two-columns">
    <div class="panel">
      <div class="panel-title">CONFUSION MATRIX</div>
      <div id="confusionMatrix"></div>
    </div>
    <div class="panel">
      <div class="panel-title">FEATURE IMPORTANCE</div>
      <div id="featureImportance"></div>
    </div>
  </div>

  <!-- Three Columns: Per-Class Metrics -->
  <div class="three-columns">
    <div class="panel">
      <div class="panel-title">GALAXY</div>
      <div id="galaxyMetrics"></div>
    </div>
    <div class="panel">
      <div class="panel-title">QSO (Quasar)</div>
      <div id="qsoMetrics"></div>
    </div>
    <div class="panel">
      <div class="panel-title">STAR</div>
      <div id="starMetrics"></div>
    </div>
  </div>

</div>
</div>

<script>
  // ============================================
  // MODEL DATA
  // ============================================

  const modelData = {
    prism: {
      name: 'PRISM',
      testAccuracy: 0.9804,
      valAccuracy: 0.9747,
      precision: 0.98,
      recall: 0.98,
      f1: 0.98,
      confusion: {
        rows: ['GALAXY', 'QSO', 'STAR'],
        cols: ['GALAXY', 'QSO', 'STAR'],
        values: [
          [8829, 87, 0],
          [147, 2679, 18],
          [0, 0, 3239]
        ]
      },
      featureImportance: [
        { name: 'red_shift', value: 0.3704 },
        { name: 'r-i', value: 0.1403 },
        { name: 'g-r', value: 0.1339 },
        { name: 'i-z', value: 0.0882 },
        { name: 'u-g', value: 0.0777 },
        { name: 'near_IR_filter', value: 0.0455 },
        { name: 'UV_filter', value: 0.0407 },
        { name: 'IR_filter', value: 0.0402 },
        { name: 'red_filter', value: 0.0318 },
        { name: 'green_filter', value: 0.0311 }
      ],
      classMetrics: {
        GALAXY: { precision: 0.98, recall: 0.99, f1: 0.98 },
        QSO: { precision: 0.96, recall: 0.94, f1: 0.95 },
        STAR: { precision: 1.00, recall: 1.00, f1: 1.00 }
      }
    },
    xgboost: {
      name: 'XGBoost',
      testAccuracy: 0.9785,
      valAccuracy: 0.9792,
      precision: 0.98,
      recall: 0.97,
      f1: 0.98,
      confusion: {
        rows: ['GALAXY', 'QSO', 'STAR'],
        cols: ['GALAXY', 'QSO', 'STAR'],
        values: [
          [8738, 173, 5],
          [121, 2715, 8],
          [0, 0, 3239]
        ]
      },
      featureImportance: [
        { name: 'red_shift', value: 0.5700 },
        { name: 'r-i', value: 0.1582 },
        { name: 'g-r', value: 0.0851 },
        { name: 'green_filter', value: 0.0437 },
        { name: 'u-g', value: 0.0416 },
        { name: 'red_filter', value: 0.0262 },
        { name: 'IR_filter', value: 0.0223 },
        { name: 'i-z', value: 0.0194 },
        { name: 'UV_filter', value: 0.0171 },
        { name: 'near_IR_filter', value: 0.0165 }
      ],
      classMetrics: {
        GALAXY: { precision: 0.98, recall: 0.98, f1: 0.98 },
        QSO: { precision: 0.96, recall: 0.94, f1: 0.95 },
        STAR: { precision: 0.99, recall: 1.00, f1: 0.99 }
      }
    },
    rf: {
      name: 'Random Forest',
      testAccuracy: 0.9782,
      valAccuracy: 0.9787,
      precision: 0.98,
      recall: 0.98,
      f1: 0.98,
      confusion: {
        rows: ['GALAXY', 'QSO', 'STAR'],
        cols: ['GALAXY', 'QSO', 'STAR'],
        values: [
          [8828, 83, 5],
          [145, 2677, 22],
          [1, 0, 3238]
        ]
      },
      featureImportance: [
        { name: 'red_shift', value: 0.5469 },
        { name: 'g-r', value: 0.1306 },
        { name: 'r-i', value: 0.1137 },
        { name: 'u-g', value: 0.0466 },
        { name: 'i-z', value: 0.0436 },
        { name: 'IR_filter', value: 0.0337 },
        { name: 'green_filter', value: 0.0302 },
        { name: 'red_filter', value: 0.0217 },
        { name: 'near_IR_filter', value: 0.0182 },
        { name: 'UV_filter', value: 0.0148 }
      ],
      classMetrics: {
        GALAXY: { precision: 0.98, recall: 0.98, f1: 0.98 },
        QSO: { precision: 0.96, recall: 0.94, f1: 0.95 },
        STAR: { precision: 0.99, recall: 1.00, f1: 0.99 }
      }
    }
  };

  let currentModel = 'prism';

  // ============================================
  // RENDER FUNCTIONS
  // ============================================

  function renderMetricsStrip(data) {
    const html = `
      <div class="metric-card highlight">
        <div class="metric-value">${(data.testAccuracy * 100).toFixed(2)}%</div>
        <div class="metric-label">TEST ACCURACY</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">${(data.valAccuracy * 100).toFixed(2)}%</div>
        <div class="metric-label">VALIDATION ACCURACY</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">${(data.precision * 100).toFixed(1)}%</div>
        <div class="metric-label">WEIGHTED PRECISION</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">${(data.recall * 100).toFixed(1)}%</div>
        <div class="metric-label">WEIGHTED RECALL</div>
      </div>
    `;
    document.getElementById('metricsStrip').innerHTML = html;
  }

  function renderConfusionMatrix(data) {
    const cm = data.confusion;
    let html = '<table class="confusion-matrix"><thead><tr><th></th>';
    cm.cols.forEach(col => html += `<th>${col}</th>`);
    html += '</tr></thead><tbody>';
    for (let i = 0; i < cm.rows.length; i++) {
      html += `<tr><th>${cm.rows[i]}</th>`;
      for (let j = 0; j < cm.values[i].length; j++) {
        const isDiagonal = (i === j);
        html += `<td class="${isDiagonal ? 'diagonal' : ''}">${cm.values[i][j]}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('confusionMatrix').innerHTML = html;
  }

  function renderFeatureImportance(data) {
    let html = '<div class="feature-list">';
    data.featureImportance.forEach(f => {
      const percent = (f.value * 100).toFixed(1);
      html += `
        <div class="feature-row">
          <div class="feature-name">${f.name}</div>
          <div class="feature-bar-container">
            <div class="feature-bar" style="width: ${percent}%;">${percent}%</div>
          </div>
          <div class="feature-value">${percent}%</div>
        </div>
      `;
    });
    html += '</div>';
    document.getElementById('featureImportance').innerHTML = html;
  }

  function renderClassMetrics(data) {
    const galaxy = data.classMetrics.GALAXY;
    const qso = data.classMetrics.QSO;
    const star = data.classMetrics.STAR;

    document.getElementById('galaxyMetrics').innerHTML = `
      <table class="class-table">
        <tr><th>Precision</th><td>${galaxy.precision.toFixed(2)}</td></tr>
        <tr><th>Recall</th><td>${galaxy.recall.toFixed(2)}</td></tr>
        <tr><th>F1 Score</th><td>${galaxy.f1.toFixed(2)}</td></tr>
      </table>
    `;

    document.getElementById('qsoMetrics').innerHTML = `
      <table class="class-table">
        <tr><th>Precision</th><td>${qso.precision.toFixed(2)}</td></tr>
        <tr><th>Recall</th><td>${qso.recall.toFixed(2)}</td></tr>
        <tr><th>F1 Score</th><td>${qso.f1.toFixed(2)}</td></tr>
      </table>
    `;

    document.getElementById('starMetrics').innerHTML = `
      <table class="class-table">
        <tr><th>Precision</th><td>${star.precision.toFixed(2)}</td></tr>
        <tr><th>Recall</th><td>${star.recall.toFixed(2)}</td></tr>
        <tr><th>F1 Score</th><td>${star.f1.toFixed(2)}</td></tr>
      </table>
    `;
  }

  function renderAll() {
    const data = modelData[currentModel];
    renderMetricsStrip(data);
    renderConfusionMatrix(data);
    renderFeatureImportance(data);
    renderClassMetrics(data);
  }

  function selectModel(model) {
    currentModel = model;
    // Update button active states
    document.querySelectorAll('.model-btn').forEach((btn, idx) => {
      if ((model === 'prism' && idx === 0) ||
          (model === 'xgboost' && idx === 1) ||
          (model === 'rf' && idx === 2)) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderAll();
  }

  // Initialize
  renderAll();
</script>
</body>
</html>
