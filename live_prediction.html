<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CosmicID — Live Prediction</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #050d1a;
    --panel: #0a1628;
    --border: #0f3460;
    --accent: #00d4ff;
    --green: #00ff9d;
    --red: #ff3c5a;
    --yellow: #ffd93d;
    --purple: #8b5cf6;
    --text: #c8e0f4;
    --dim: #4a6fa5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .everything { position: relative; z-index: 1; }

  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
  }

  header h1 span { color: var(--accent); }

  .status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--green);
    color: var(--green);
  }

  .status-badge.error { border-color: var(--red); color: var(--red); }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .two-columns {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-group label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .input-group input {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    outline: none;
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,212,255,0.2);
  }

  .sample-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .sample-btn {
    font-family: 'Share Tech Mono', monospace;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 10px;
    transition: all 0.2s;
  }

  .sample-btn.star:hover { border-color: var(--green); color: var(--green); }
  .sample-btn.galaxy:hover { border-color: var(--accent); color: var(--accent); }
  .sample-btn.qso:hover { border-color: var(--yellow); color: var(--yellow); }

  .run-btn {
    width: 100%;
    font-family: 'Share Tech Mono', monospace;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border: none;
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    transition: all 0.2s;
  }

  .run-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .run-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 500px;
    overflow-y: auto;
  }

  .feature-item {
    border-bottom: 1px solid rgba(15,52,96,0.5);
    padding-bottom: 8px;
  }

  .feature-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .feature-desc {
    font-size: 10px;
    color: var(--dim);
    margin-top: 8px;
    line-height: 1.4;
    display: none;
  }

  .feature-desc.show { display: block; }

  .results-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 24px;
  }

  .result-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
  }

  .result-card.rf { border-top: 3px solid #4ecdc4; }
  .result-card.xgb { border-top: 3px solid var(--yellow); }
  .result-card.prism { border-top: 3px solid var(--purple); }

  .result-model {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .result-prediction {
    font-size: 28px;
    font-weight: 700;
    margin: 12px 0;
  }

  .result-prediction.STAR { color: var(--green); }
  .result-prediction.GALAXY { color: var(--accent); }
  .result-prediction.QSO { color: var(--yellow); }

  .gauge {
    width: 100px;
    height: 100px;
    margin: 10px auto;
  }

  .probability-table {
    width: 100%;
    margin-top: 15px;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    border-collapse: collapse;
  }

  .probability-table td {
    padding: 6px 4px;
    border-bottom: 1px solid var(--border);
  }

  .probability-table td:last-child {
    text-align: right;
    color: var(--accent);
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--dim);
  }

  @media (max-width: 1000px) {
    .two-columns, .results-row { grid-template-columns: 1fr; }
    .input-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="everything">

<header>
  <div class="logo">COSMICID // LIVE PREDICTION</div>
  <h1>Real-Time Classification: <span>Stars · Galaxies · Quasars</span></h1>
  <div class="status-badge" id="apiStatus">● CHECKING API...</div>
</header>

<div class="main">

  <div class="two-columns">
    <div class="panel">
      <div class="panel-title">INPUT PARAMETERS</div>

      <div class="sample-buttons">
        <button class="sample-btn star" onclick="fillSample('star')"> STAR SAMPLE</button>
        <button class="sample-btn galaxy" onclick="fillSample('galaxy')"> GALAXY SAMPLE</button>
        <button class="sample-btn qso" onclick="fillSample('qso')"> QSO SAMPLE</button>
      </div>

      <div class="input-grid" id="inputGrid"></div>

      <button class="run-btn" id="runBtn" onclick="runPrediction()">▶ RUN PREDICTION</button>
    </div>

    <div class="panel">
      <div class="panel-title">FEATURE GUIDE</div>
      <div class="feature-list" id="featureGuide"></div>
    </div>
  </div>

  <div class="results-row" id="resultsRow">
    <div class="loading">Enter values and click RUN</div>
  </div>

</div>
</div>

<script>
  const API_URL = 'https://cosmicid.onrender.com';

  // Feature definitions
  const features = [
    { id: 'uv', label: 'UV_filter (u-band)', desc: 'Ultraviolet magnitude from SDSS. Range: 9-30 (lower = brighter). Stars: 15-20 (brighter), Galaxies: 20-25, Quasars: 22-28 (very faint).' },
    { id: 'green', label: 'green_filter (g-band)', desc: 'Green/blue magnitude from SDSS. Range: 9-30. Used for stellar temperature estimation. Hot stars: lower values, Cool stars: higher values.' },
    { id: 'red', label: 'red_filter (r-band)', desc: 'Red magnitude from SDSS. Range: 9-30. Key for redshift calculations. Higher values = fainter, more distant objects.' },
    { id: 'near_ir', label: 'near_IR_filter (i-band)', desc: 'Near-infrared magnitude. Range: 9-30. Helps distinguish distant galaxies and red stars.' },
    { id: 'ir', label: 'IR_filter (z-band)', desc: 'Infrared magnitude. Range: 9-30. Sensitive to high-redshift objects (z > 5). Quasars often appear brighter in this band.' },
    { id: 'redshift', label: 'red_shift', desc: 'Redshift value (z) measuring how much light has stretched. Range: -0.01 to 7.5. Stars: z≈0 (in our galaxy), Galaxies: z=0.1-0.6 (moderate distance), Quasars: z=1-7 (extremely distant, early universe).' },
    { id: 'ug', label: 'u-g', desc: 'UV minus Green index. Range: -15 to 20. Hot stars: negative, Galaxies: +2 to +3.' },
    { id: 'gr', label: 'g-r', desc: 'Green minus Red color index. Range: -15 to 15. Main stellar temperature indicator. Hot stars: negative, Sun-like stars: ~0.6, Red giants: >1.0.' },
    { id: 'ri', label: 'r-i', desc: 'Red minus Near-IR index. Range: -15 to 15. Good for red galaxies. Early-type galaxies: 0.5-1.0, Late-type galaxies: 0.2-0.5.' },
    { id: 'iz', label: 'i-z', desc: 'Near-IR minus IR index. Range: -15 to 15. Helps separate galaxies from quasars. Galaxies: often positive (0.2-0.5), Quasars: can be negative due to emission lines.' }
  ];

  // Sample data
  const samples = {
      star: { 
        uv: 21.74669,
        green: 20.03493,
        red: 19.17553,
        near_ir: 18.81823,
        ir: 18.65422,
        redshift: -0.000008,
        ug: 1.71176,
        gr: 0.85940,
        ri: 0.35730,
        iz: 0.16401
    },
      galaxy: {
        uv: 23.88,
        green: 22.28,
        red: 20.40,
        near_ir: 19.17,
        ir: 18.79,
        redshift: 0.635,
        ug: 1.60,
        gr: 1.88,
        ri: 1.23,
        iz: 0.38
    },
      qso: {
        uv: 24.78,
        green: 22.83,
        red: 22.58,
        near_ir: 21.17,
        ir: 21.61,
        redshift: 2.500,
        ug: 1.95,
        gr: 0.25,
        ri: 1.41,
        iz: -0.44
    }
  };

  // Check API health
  async function checkAPI() {
    const statusEl = document.getElementById('apiStatus');
    const runBtn = document.getElementById('runBtn');
    try {
      const response = await fetch(`${API_URL}/health`);
      if (response.ok) {
        statusEl.textContent = '● API ONLINE';
        statusEl.className = 'status-badge';
        runBtn.disabled = false;
      } else {
        throw new Error('API not responding');
      }
    } catch (error) {
      statusEl.textContent = '● API OFFLINE - Run python app_api.py';
      statusEl.className = 'status-badge error';
      runBtn.disabled = true;
    }
  }

  // Render input form
  function renderInputs() {
    const container = document.getElementById('inputGrid');
    let html = '';
    features.forEach(f => {
      html += `
        <div class="input-group">
          <label>${f.label}</label>
          <input type="number" step="0.01" id="input_${f.id}" value="" placeholder="e.g., 22.5">
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // Render feature guide
  function renderFeatureGuide() {
    const container = document.getElementById('featureGuide');
    let html = '';
    features.forEach((f, idx) => {
      html += `
        <div class="feature-item">
          <div class="feature-header" onclick="toggleDesc(${idx})">
            <span>${f.label}</span>
            <span class="toggle-icon" id="toggle_${idx}">▼</span>
          </div>
          <div class="feature-desc" id="desc_${idx}">${f.desc}</div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function toggleDesc(idx) {
    const desc = document.getElementById(`desc_${idx}`);
    const icon = document.getElementById(`toggle_${idx}`);
    desc.classList.toggle('show');
    icon.textContent = desc.classList.contains('show') ? '▲' : '▼';
  }

  // Fill sample data
  function fillSample(type) {
    const sample = samples[type];
    for (const key in sample) {
      const input = document.getElementById(`input_${key}`);
      if (input) input.value = sample[key];
    }
  }

  // Get current inputs
  function getCurrentInputs() {
    const inputs = {};
    features.forEach(f => {
      const input = document.getElementById(`input_${f.id}`);
      inputs[f.id] = input ? parseFloat(input.value) : 0;
    });
    return inputs;
  }

  // Run prediction
  async function runPrediction() {
    const inputs = getCurrentInputs();
    
    // DEBUG: Print what we're sending
    console.log("Sending to API:", inputs);

    const runBtn = document.getElementById('runBtn');
    const resultsRow = document.getElementById('resultsRow');
    
    runBtn.disabled = true;
    runBtn.textContent = '⏳ PROCESSING...';
    resultsRow.innerHTML = '<div class="loading">⏳ Calling models...</div>';
    
    try {
      const response = await fetch(`${API_URL}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(inputs)
      });
      
      const data = await response.json();
      
      if (data.success) {
        renderResults(data.predictions);
      } else {
        resultsRow.innerHTML = `<div class="loading" style="color: var(--red);">ERROR: ${data.error}</div>`;
      }
    } catch (error) {
      resultsRow.innerHTML = `<div class="loading" style="color: var(--red);">ERROR: Cannot connect to API. Make sure python app_api.py is running.</div>`;
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = '▶ RUN PREDICTION';
    }
  }

  // Render results
  function renderResults(predictions) {
      const container = document.getElementById('resultsRow');
      const models = [
          { key: 'rf', name: 'RANDOM FOREST', borderColor: '#4ecdc4' },
          { key: 'xgb', name: 'XGBOOST', borderColor: '#ffd93d' },
          { key: 'prism', name: 'PRISM', borderColor: '#8b5cf6' }
      ];
    
      let html = '';
      models.forEach(m => {
          const pred = predictions[m.key];
          const predClass = pred.prediction;
          const confidence = parseFloat(pred.confidence).toFixed(1);
          const gaugeOffset = 283 * (1 - confidence / 100);
          const probs = pred.probabilities;
        
          html += `
              <div class="result-card ${m.key}" style="border-top-color: ${m.borderColor};">
                  <div class="result-model" style="color: ${m.borderColor};">${m.name}</div>
                  <div class="result-prediction ${predClass}">${predClass}</div>
                  <div class="gauge">
                      <svg width="100" height="100" viewBox="0 0 100 100">
                          <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8"/>
                          <circle cx="50" cy="50" r="45" fill="none" stroke="${m.borderColor}" stroke-width="8" 
                                  stroke-dasharray="283" stroke-dashoffset="${gaugeOffset}" transform="rotate(-90 50 50)"/>
                          <text x="50" y="55" text-anchor="middle" fill="white" font-size="18" font-weight="bold">${confidence}%</text>
                      </svg>
                  </div>
                  <div style="font-size: 9px; color: #4a6fa5; margin-top: 5px;">CONFIDENCE SCORE</div>
                  <div style="font-size: 10px; font-weight: 600; color: #c0c0c0; margin: 12px 0 6px;">PROBABILITY DISTRIBUTION</div>
                  <table class="probability-table">
                      <tr>
                          <td>GALAXY</td>
                          <td style="text-align: right; font-weight: 500;">${parseFloat(probs.GALAXY).toFixed(1)}%</td>
                      </tr>
                      <tr>
                          <td>QSO</td>
                          <td style="text-align: right; font-weight: 500;">${parseFloat(probs.QSO).toFixed(1)}%</td>
                      </tr>
                      <tr>
                          <td>STAR</td>
                          <td style="text-align: right; font-weight: 500;">${parseFloat(probs.STAR).toFixed(1)}%</td>
                      </tr>
                  </table>
              </div>
          `;

    });
    container.innerHTML = html;
  }

  // Initialize
  renderInputs();
  renderFeatureGuide();
  checkAPI();
  setInterval(checkAPI, 30000); // Check every 30 seconds
</script>
</body>
</html>
